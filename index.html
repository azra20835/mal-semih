<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Oyunu</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h2{
    margin-top:15px;
}

#score{
    font-size:22px;
    font-weight:bold;
}

#board{
    position:relative;
    width:360px;
    height:360px;
    margin:20px auto;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 25px black;
    background:
    radial-gradient(circle,
    #00aa00 0%, #00aa00 5%,
    #ff0000 5%, #ff0000 10%,
    #f5e6c8 10%, #f5e6c8 20%,
    #111 20%, #111 35%,
    #f5e6c8 35%, #f5e6c8 50%,
    #222 50%, #222 100%);
}

#centerImg{
    position:absolute;
    width:90px;
    height:90px;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    border:3px solid white;
}

.arrow{
    position:absolute;
    width:80px;
    height:20px;
    transform-origin:left center;
    pointer-events:none;
}
</style>
</head>
<body>

<h2>Dart Oyunu 🎯</h2>
<div>Puan: <span id="score">0</span></div>

<div id="board">
    <img src="ben.jpg" id="centerImg">
</div>

<script>
const board = document.getElementById("board");
const scoreText = document.getElementById("score");
let score = 0;

function makeArrow() {
    const div = document.createElement("div");
    div.className = "arrow";

    div.innerHTML = `
    <svg width="80" height="20" viewBox="0 0 80 20">
        <polygon points="0,10 12,2 12,18" fill="red"/>
        <polygon points="6,10 18,0 18,20" fill="#ff8888"/>
        <rect x="12" y="8" width="50" height="4" fill="#8B5A2B"/>
        <polygon points="62,10 80,2 80,18" fill="silver"/>
    </svg>
    `;

    return div;
}

function shoot(x,y){

    const arrow = makeArrow();

    const startX = 180;
    const startY = 180;

    arrow.style.left = startX + "px";
    arrow.style.top = startY + "px";

    board.appendChild(arrow);

    const dx = x - startX;
    const dy = y - startY;

    const angle = Math.atan2(dy, dx) * 180 / Math.PI;

    let frame = 0;
    const totalFrames = 40;

    const anim = setInterval(() => {

        frame++;

        const p = frame / totalFrames;

        const nx = startX + dx * p;
        const ny = startY + dy * p;

        arrow.style.left = nx + "px";
        arrow.style.top = ny + "px";
        arrow.style.transform = `rotate(${angle}deg)`;

        if(frame >= totalFrames){

            clearInterval(anim);

            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 30) score += 50;
            else if(dist < 80) score += 20;
            else if(dist < 130) score += 10;
            else score += 5;

            scoreText.textContent = score;
        }

    },10);
}

board.addEventListener("click",(e)=>{
    const r = board.getBoundingClientRect();
    shoot(
        e.clientX - r.left,
        e.clientY - r.top
    );
});

board.addEventListener("touchstart",(e)=>{
    const r = board.getBoundingClientRect();
    const t = e.touches[0];

    shoot(
        t.clientX - r.left,
        t.clientY - r.top
    );
});
</script>

</body>
</html>
